<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>병원 YouTube 리포트 허브</title>
<style>
  :root{--bg:#f4f6f8;--card:#fff;--ink:#1a2230;--muted:#6b7585;--line:#e6eaef;--accent:#0b7a5e;
    --shadow:0 1px 3px rgba(20,30,48,.06),0 6px 24px rgba(20,30,48,.06)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Pretendard",sans-serif;
    background:var(--bg);color:var(--ink);padding:32px 16px 64px;line-height:1.5}
  .wrap{max-width:600px;margin:0 auto}
  h1{font-size:22px;font-weight:800;letter-spacing:-.4px}
  .sub{font-size:13px;color:var(--muted);margin-top:6px;margin-bottom:24px}
  .ch{margin-bottom:22px}
  .ch .name{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .ch .name .dot{width:6px;height:6px;border-radius:50%;background:var(--accent)}
  .links{display:flex;flex-wrap:wrap;gap:8px}
  a.month{background:var(--card);border-radius:10px;padding:9px 14px;font-size:14px;font-weight:600;
    text-decoration:none;color:var(--ink);box-shadow:var(--shadow);transition:transform .12s}
  a.month:hover{transform:translateY(-1px);color:var(--accent)}
  .foot{font-size:12px;color:var(--muted);margin-top:34px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <h1>병원 YouTube 월간 리포트</h1>
  <div class="sub">채널별 리포트 모음 · 운영자용 허브</div>

  <div class="ch">
    <div class="name"><span class="dot"></span>연세정형외과</div>
    <div class="links">
      <a class="month" href="yonsei-ortho/2026-06.html">2026년 6월</a>
    </div>
  </div>

  <div class="foot">새 채널·새 달은 폴더와 HTML을 추가하면 자동으로 늘어납니다.</div>
</div>
</body>
</html>
